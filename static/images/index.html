<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LIGHTSEED Logo Animation</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  overflow:hidden;
  font-family:serif;
}

/* Main Wrapper */
.logo-scene{
  position:relative;
  width:600px;
  height:700px;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Glow Background */
.logo-glow{
  position:absolute;
  width:350px;
  height:350px;
  border-radius:50%;
  background:radial-gradient(circle,
  rgba(255,215,0,0.45) 0%,
  rgba(255,215,0,0.15) 40%,
  transparent 75%);
  filter:blur(20px);
  animation:pulse 4s ease-in-out infinite;
}

/* Rotating Aura */
.aura-ring{
  position:absolute;
  width:420px;
  height:420px;
  border-radius:50%;
  border:1px solid rgba(255,215,0,0.2);
  animation:rotate 16s linear infinite;
}

.aura-ring::before{
  content:'';
  position:absolute;
  inset:-10px;
  border-radius:50%;
  border:1px solid rgba(255,215,0,0.1);
}

/* Logo */
.logo{
  position:relative;
  width:420px;
  z-index:5;
  animation:float 5s ease-in-out infinite;
  filter:
    drop-shadow(0 0 5px rgba(255,215,0,0.5))
    drop-shadow(0 0 20px rgba(255,215,0,0.4))
    drop-shadow(0 0 50px rgba(255,215,0,0.3));
}

/* SVG Animation */
svg{
  width:100%;
  overflow:visible;
}

path,
line,
polygon,
circle{
  stroke:#f4d03f;
  stroke-width:2;
  fill:none;
  stroke-dasharray:1200;
  stroke-dashoffset:1200;
  animation:draw 4s ease forwards;
}

/* Seed Fill */
.seed{
  fill:#f4d03f;
  opacity:0;
  animation:seedGlow 2s ease forwards 2.8s;
}

/* Text */
.logo-text{
  position:absolute;
  bottom:40px;
  text-align:center;
  color:#f4d03f;
  letter-spacing:12px;
  font-size:48px;
  opacity:0;
  transform:translateY(20px);
  animation:textReveal 2s ease forwards 3s;
}

.tagline{
  position:absolute;
  bottom:0;
  color:#d4af37;
  font-size:14px;
  letter-spacing:5px;
  opacity:0;
  animation:textReveal 2s ease forwards 3.6s;
}

/* Shine Sweep */
.shine{
  position:absolute;
  width:120px;
  height:700px;
  background:linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,0.7),
    transparent
  );
  transform:rotate(20deg);
  left:-250px;
  animation:shine 5s ease infinite 4s;
}

/* Particles */
.particle{
  position:absolute;
  width:4px;
  height:4px;
  background:#ffd700;
  border-radius:50%;
  box-shadow:0 0 12px #ffd700;
  animation:particle 6s linear infinite;
}

.p1{ top:20%; left:25%; animation-delay:0s; }
.p2{ top:30%; right:20%; animation-delay:1s; }
.p3{ bottom:25%; left:20%; animation-delay:2s; }
.p4{ bottom:20%; right:25%; animation-delay:3s; }

@keyframes draw{
  to{
    stroke-dashoffset:0;
  }
}

@keyframes pulse{
  0%,100%{
    transform:scale(1);
    opacity:0.7;
  }
  50%{
    transform:scale(1.15);
    opacity:1;
  }
}

@keyframes rotate{
  from{
    transform:rotate(0deg);
  }
  to{
    transform:rotate(360deg);
  }
}

@keyframes float{
  0%,100%{
    transform:translateY(0px);
  }
  50%{
    transform:translateY(-10px);
  }
}

@keyframes textReveal{
  to{
    opacity:1;
    transform:translateY(0px);
  }
}

@keyframes seedGlow{
  0%{
    opacity:0;
    transform:scale(0.5);
  }
  100%{
    opacity:1;
    transform:scale(1);
    filter:drop-shadow(0 0 20px gold);
  }
}

@keyframes shine{
  0%{
    left:-250px;
    opacity:0;
  }
  20%{
    opacity:1;
  }
  50%{
    left:800px;
    opacity:0;
  }
  100%{
    left:800px;
    opacity:0;
  }
}

@keyframes particle{
  0%{
    transform:translateY(0px) scale(0);
    opacity:0;
  }
  20%{
    opacity:1;
  }
  50%{
    transform:translateY(-40px) scale(1.5);
  }
  100%{
    transform:translateY(-80px) scale(0);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="logo-scene">

  <div class="logo-glow"></div>
  <div class="aura-ring"></div>

  <div class="shine"></div>

  <div class="logo">

    <svg viewBox="0 0 400 500">

      <!-- Triangle -->
      <polygon points="200,20 60,300 340,300" />

      <!-- Inner Circle -->
      <circle cx="200" cy="110" r="28" />

      <!-- Rays -->
      <line x1="200" y1="210" x2="120" y2="160" />
      <line x1="200" y1="210" x2="140" y2="130" />
      <line x1="200" y1="210" x2="170" y2="110" />
      <line x1="200" y1="210" x2="200" y2="90" />
      <line x1="200" y1="210" x2="230" y2="110" />
      <line x1="200" y1="210" x2="260" y2="130" />
      <line x1="200" y1="210" x2="280" y2="160" />

      <!-- Seed -->
      <path class="seed"
      d="M200 210
      C170 250,170 320,200 350
      C230 320,230 250,200 210Z"/>

      <!-- Lower Bars -->
      <line x1="90" y1="240" x2="160" y2="240" />
      <line x1="240" y1="240" x2="310" y2="240" />

      <line x1="80" y1="270" x2="150" y2="270" />
      <line x1="250" y1="270" x2="320" y2="270" />

      <line x1="70" y1="300" x2="140" y2="300" />
      <line x1="260" y1="300" x2="330" y2="300" />

    </svg>

  </div>

  <div class="logo-text">
    LIGHTSEED
  </div>

  <div class="tagline">
    ROOTED IN WISDOM. RISING IN LIGHT.
  </div>

  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>

</div>

</body>
</html>
