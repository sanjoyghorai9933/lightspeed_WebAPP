<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Lightseed</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #1C1C1C; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .login-logo { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; }
    .btn-login { background: #2D4A3E; color: #fff; border: none; border-radius: 100px; padding: 0.75rem; width: 100%; font-size: 0.85rem; letter-spacing: 0.08em; text-transform: uppercase; transition: background 0.2s; }
    .btn-login:hover { background: #2A7A6F; }
    .form-control:focus { border-color: #6B9E85; box-shadow: 0 0 0 3px rgba(107,158,133,0.15); }
    .eyebrow { font-size: 0.65rem; letter-spacing: 0.28em; text-transform: uppercase; color: #C9A84C; }
  </style>
</head>
<body>
  <div class="login-card text-center">
    <img src="/static/images/logo.jpg" alt="Lightseed" class="login-logo mb-3">
    <div class="eyebrow mb-1">Admin Portal</div>
    <h4 style="font-family:Georgia,serif;font-weight:400;margin-bottom:2rem;">Lightseed Solutions LLP</h4>
    {% if error %}
    <div class="alert alert-danger rounded-3 py-2 mb-3" style="font-size:0.83rem;">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/admin/login">
      <div class="mb-3 text-start">
        <label class="form-label" style="font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:#6B6B6B;">Username</label>
        <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
      </div>
      <div class="mb-4 text-start">
        <label class="form-label" style="font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:#6B6B6B;">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">Sign In</button>
    </form>
    <p class="mt-4 mb-0" style="font-size:0.72rem;color:#aaa;">Default: admin / lightseed2025</p>
    <a href="/" style="font-size:0.75rem;color:#6B9E85;display:block;margin-top:0.5rem;">← Back to website</a>
  </div>
</body>
</html>
